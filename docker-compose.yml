version: "3.9"

services:
  app:
    build: .
    container_name: order-agent-app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./vector_db_stores:/app/vector_db_stores
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: always
    depends_on:
      - mysql
      - qdrant

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-order-agent-app
    environment:
      - PYTHONWARNINGS=ignore
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

volumes:
  mysql_data: